# Local infra for the pg-hybrid-rag playground:
#   - db:        Postgres with pgvector + VectorChord (vchord) + pg_textsearch
#   - embedding: self-hosted embedding API via HuggingFace TEI
#
# Usage (Docker or Podman):
#   EMBEDDING_API_KEY=your-key docker compose up
#   EMBEDDING_API_KEY=your-key podman compose up
#
# The db service builds a custom image from examples/Dockerfile on first run.
# It extends tensorchord/vchord-postgres (pgvector + vchord) with the
# timescale/pg_textsearch .deb, then sets shared_preload_libraries so all
# three extensions are available without a separate compose file.
#
# Playground flags (all work with this single compose file):
#   bun run examples/playground.ts --vectorchord   # vchordrq index
#   bun run examples/playground.ts --bm25          # BM25 full-text search
#   bun run examples/playground.ts --vectorchord --bm25
#
# CJK support (pg_bigm) is NOT in this image — only needed with { cjk: true }.
#
# TEI downloads the model from HuggingFace on first start.
# The hf-cache volume persists it across restarts.
#
# Production note:
#   For production, use a GPU image (ghcr.io/huggingface/text-embeddings-inference:1.9)
#   or a quantized ONNX model (e.g. onnx/model_qint8_avx512_vnni.onnx from
#   https://huggingface.co/intfloat/multilingual-e5-small) on appropriate Intel
#   CPUs with AVX-512 VNNI support.

services:
  db:
    build:
      context: .
      dockerfile: Dockerfile
    image: pg-hybrid-rag-db:latest
    command:
      - postgres
      - -c
      - shared_preload_libraries=vchord,pg_textsearch
    ports:
      - "5432:5432"
    environment:
      # Matches DATABASE_URL in .env.example:
      #   postgresql://user:password@localhost:5432/postgres
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=postgres
    volumes:
      - pg-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  embedding:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.9
    ports:
      - "3333:3333"
    volumes:
      - hf-cache:/data
    restart: unless-stopped
    environment:
      - API_KEY=${EMBEDDING_API_KEY}
    command:
      [
        "--model-id", "intfloat/multilingual-e5-small",
        "--max-batch-tokens", "4096",
        "--max-client-batch-size", "8",
        "--port", "3333",
      ]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3333/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  hf-cache:
  pg-data:
