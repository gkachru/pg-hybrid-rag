# Minimal GPU inference for the rerank-the-union experiment — ONLY the 2 models it uses.
#
# Why this variant exists: the benchmarks only ever call bge-m3 (embedder) + bge-reranker-v2-m3
# (reranker); e5-large/e5-small in the 4-model docker-compose.infinity.yml were idle ballast.
# Dropping them frees ~2.5GB VRAM headroom. (NB: the host GPU-driver crashes seen during these
# runs were ultimately traced to using the laptop camera mid-run, not VRAM/concurrency — see
# BENCHMARKING_LOG.md. SEARCH_CONCURRENCY=8 runs fine once the camera is left alone.)
#
#   podman compose -f docker-compose.infinity-min.yml up -d
#
# Same `name:` as the 4-model compose so it replaces (not duplicates) the infinity service.
name: infinity-embed

services:
  infinity:
    image: docker.io/michaelf34/infinity:latest
    ports:
      - "7997:7997"
    devices:
      - nvidia.com/gpu=all
    environment:
      - LD_LIBRARY_PATH=/usr/lib/wsl/lib
    volumes:
      - infinity-cache:/app/.cache
    command:
      - v2
      - --model-id
      - BAAI/bge-m3
      - --model-id
      - BAAI/bge-reranker-v2-m3
      - --device
      - cuda
      # See docker-compose.infinity.yml: varlen kernel poisons the CUDA context on over-length input.
      - --no-bettertransformer
      - --port
      - "7997"

volumes:
  infinity-cache:
